services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-soomgil}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_USER: ${DB_USERNAME:-soomgil}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-soomgil} -d ${DB_NAME:-soomgil}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 'true'
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAIL_WEB_PORT:-8025}:8025'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-soomgil}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-change-me}
    ports:
      - '${S3_PORT:-9000}:9000'
      - '${S3_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-soomgil}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-change-me}
      S3_BUCKET: ${MINIO_BUCKET:-soomgil-local}
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD
      && mc mb --ignore-existing local/$$S3_BUCKET"
    restart: 'no'

  backend:
    profiles: [full]
    image: soomgil-dev-backend:latest
    build:
      context: ./backend
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: 'false'
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_BUCKET: ${S3_BUCKET:-soomgil-local}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-soomgil}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-change-me}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/soomgil-local}
    command: ./gradlew bootRun --continuous --no-daemon
    ports:
      - '${SERVER_PORT:-8080}:8080'
    volumes:
      - ./backend:/workspace
      - backend-gradle-cache:/root/.gradle
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  frontend:
    profiles: [full]
    image: soomgil-dev-frontend:latest
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_WS_PROXY_TARGET: http://backend:8080
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    command: npm run dev -- --host 0.0.0.0
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend:/workspace
      - frontend-node-modules:/workspace/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  minio-data:
  backend-gradle-cache:
  frontend-node-modules:
