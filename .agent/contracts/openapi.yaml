openapi: 3.1.0
info:
  title: Soomgil Backend API
  version: 0.1.0
  description: >
    숨길(Soomgil) V1 백엔드 REST API 협의 초안입니다.
    근거 문서: .agent/docs/product-specs/service_requirements.md,
    .agent/contracts/backend_contract_decisions.md, .agent/contracts/schema.dbml.
    미확정 사항은 TODO 또는 확인 필요로 표시했습니다.
servers:
  - url: https://api.soomgil.example.com/api/v1
    description: Production placeholder. TODO 실제 도메인 확인 필요.
  - url: http://localhost:8080/api/v1
    description: Local development.
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Me
  - name: Users
  - name: Regions
  - name: Trips
  - name: Places
  - name: Swipe
  - name: Itinerary
  - name: Planning
  - name: Chat
  - name: AI
  - name: Records
  - name: Media
  - name: Community
  - name: Notifications
  - name: Admin
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 이메일/비밀번호 회원가입
      operationId: register
      description: >
        auth.users, auth.user_email_addresses, auth.user_profiles, auth.user_settings,
        auth.user_password_credentials, auth.user_policy_acceptances를 함께 생성한다.
        이메일 인증 token은 원문이 아니라 hash만 저장한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/email-verification-requests:
    post:
      tags: [Auth]
      summary: 이메일 인증 메일 발송 요청
      operationId: requestEmailVerification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '202':
          description: Accepted
        '429':
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /auth/email-verifications:
    post:
      tags: [Auth]
      summary: 이메일 인증 token 확인
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [Auth]
      summary: 이메일/비밀번호 로그인
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/password-reset-requests:
    post:
      tags: [Auth]
      summary: 비밀번호 재설정 메일 발송 요청
      operationId: requestPasswordReset
      security: []
      description: 계정 존재 여부를 노출하지 않도록 성공/실패 모두 202를 권장한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Accepted
  /auth/password-resets:
    post:
      tags: [Auth]
      summary: 비밀번호 재설정 실행
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: No Content
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/policy-documents:
    get:
      tags: [Auth]
      summary: 약관/정책 문서 목록 조회
      operationId: listPolicyDocuments
      security: []
      parameters:
        - name: requiredOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: languageCode
          in: query
          schema:
            type: string
            default: ko
            maxLength: 12
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PolicyDocument'
  /auth/oauth/{provider}/authorization-url:
    get:
      tags: [Auth]
      summary: 소셜 로그인 authorization URL 발급
      operationId: getOAuthAuthorizationUrl
      security: []
      description: 프론트가 provider URL을 직접 만들지, 서버가 만들지 확인 필요.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProviderCode'
        - name: redirectUri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: state
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizationUrlResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/oauth/{provider}/callback:
    post:
      tags: [Auth]
      summary: 소셜 로그인 callback 처리
      operationId: handleOAuthCallback
      security: []
      description: 신규 소셜 계정의 약관 동의/displayName 보완 흐름 확인 필요.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProviderCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 재발급
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      summary: 현재 refresh session revoke
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me:
    get:
      tags: [Me]
      summary: 현재 사용자 조회
      operationId: getMe
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Me]
      summary: 현재 사용자 프로필 수정
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Me]
      summary: 계정 삭제 예약
      operationId: requestAccountDeletion
      description: >
        auth.users.status=PENDING_DELETION과 deletion_requested_at/deletion_scheduled_at에 대응한다.
        즉시 hard delete하지 않는다. 요청자가 owner_user_id인 활성 여행방이 있으면 MVP에서는 OWNER 이관이 없으므로 409를 반환하고 삭제 예약을 차단한다.
      responses:
        '202':
          description: Accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/settings:
    get:
      tags: [Me]
      summary: 내 사용자 설정 조회
      operationId: getMySettings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
    patch:
      tags: [Me]
      summary: 내 사용자 설정 수정
      operationId: updateMySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserSettingsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
  /me/sessions:
    get:
      tags: [Me]
      summary: 내 로그인 세션 목록
      operationId: listMySessions
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUserSession'
  /me/sessions/{sessionId}:
    delete:
      tags: [Me]
      summary: 특정 로그인 세션 revoke
      operationId: revokeMySession
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
  /me/security-events:
    get:
      tags: [Me]
      summary: 내 보안 이벤트 조회
      operationId: listMySecurityEvents
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedSecurityEvent'
  /users:
    get:
      tags: [Users]
      summary: 사용자 검색
      operationId: searchUsers
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedUserSummary'
  /users/{userId}:
    get:
      tags: [Users]
      summary: 사용자 공개 프로필 조회
      operationId: getUser
      description: PRIVATE 프로필은 승인된 follower에게만 전체 프로필을 반환하고, 미승인 사용자에게는 제한된 summary를 반환한다. block account는 MVP에서 제공하지 않는다.
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublicProfile'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{userId}/follow:
    put:
      tags: [Users]
      summary: 사용자 팔로우
      operationId: followUser
      description: self-follow는 CANNOT_FOLLOW_SELF로 거절한다. 대상 프로필이 PRIVATE이면 PENDING follow request를 생성하고, PUBLIC이면 ACTIVE follow를 생성한다.
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Follow'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Users]
      summary: 팔로우 취소
      operationId: unfollowUser
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
  /me/follow-requests:
    get:
      tags: [Users]
      summary: 내 비공개 프로필 follow 요청 목록
      operationId: listMyFollowRequests
      description: 내 PRIVATE 프로필에 대한 PENDING follow request를 조회한다.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedFollowRequest'
  /me/follow-requests/{userId}/accept:
    put:
      tags: [Users]
      summary: follow 요청 승인
      operationId: acceptFollowRequest
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Follow'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/follow-requests/{userId}:
    delete:
      tags: [Users]
      summary: follow 요청 거절
      operationId: rejectFollowRequest
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
  /legal-regions:
    get:
      tags: [Regions]
      summary: 법정동 지역 검색
      operationId: searchLegalRegions
      security: []
      description: 공개 여부 확인 필요.
      parameters:
        - $ref: '#/components/parameters/q'
        - name: level
          in: query
          schema:
            $ref: '#/components/schemas/LegalRegionLevel'
        - name: parentCode
          in: query
          schema:
            type: string
            maxLength: 10
        - name: isActive
          in: query
          schema:
            type: boolean
            default: true
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedLegalRegion'
  /viewport:
    get:
      tags: [Regions]
      summary: 지도 viewport 요약
      operationId: summarizeViewport
      parameters:
        - name: bbox
          in: query
          required: true
          description: minLng,minLat,maxLng,maxLat 순서의 지도 경계
          schema:
            type: string
            example: 126.9,37.4,127.2,37.7
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewportSummary'
        '422':
          $ref: '#/components/responses/ValidationError'
  /coordinates/simplify:
    post:
      tags: [Regions]
      summary: 지도 좌표 목록 단순화
      operationId: simplifyCoordinates
      description: 첫 좌표와 마지막 좌표를 유지하면서 좌표 수를 제한한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimplifyCoordinatesRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimplifiedCoordinates'
        '422':
          $ref: '#/components/responses/ValidationError'
  /trips:
    get:
      tags: [Trips]
      summary: 내 여행방 목록
      operationId: listTrips
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TripStatus'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/TripAccessRole'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTripSummary'
    post:
      tags: [Trips]
      summary: 여행방 생성
      operationId: createTrip
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
        '422':
          $ref: '#/components/responses/ValidationError'
  /trips/{tripId}:
    get:
      tags: [Trips]
      summary: 여행방 상세 조회
      operationId: getTrip
      parameters:
        - $ref: '#/components/parameters/tripId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Trips]
      summary: 여행방 설정 수정
      operationId: updateTrip
      description: trip.owner_user_id 사용자 권한을 기본으로 한다. MEMBER 수정 가능 범위 확인 필요.
      parameters:
        - $ref: '#/components/parameters/tripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTripRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Trips]
      summary: 여행방 soft delete
      operationId: deleteTrip
      parameters:
        - $ref: '#/components/parameters/tripId'
      responses:
        '204':
          description: No Content
        '403':
          $ref: '#/components/responses/Forbidden'
  /trips/{tripId}/members:
    get:
      tags: [Trips]
      summary: 여행방 멤버 목록
      operationId: listTripMembers
      parameters:
        - $ref: '#/components/parameters/tripId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TripMemberStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripMember'
  /trips/{tripId}/members/{userId}:
    delete:
      tags: [Trips]
      summary: 멤버 제거 또는 나가기
      operationId: removeTripMember
      description: MVP는 OWNER 이관을 제공하지 않는다. owner_user_id 사용자의 나가기/삭제 정책 확인 필요.
      parameters:
        - $ref: '#/components/parameters/tripId'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: No Content
        '422':
          $ref: '#/components/responses/ValidationError'
  /trips/{tripId}/invites:
    post:
      tags: [Trips]
      summary: 여행방 초대 생성
      operationId: createTripInvite
      parameters:
        - $ref: '#/components/parameters/tripId'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripInviteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripInvite'
        '403':
          $ref: '#/components/responses/Forbidden'
  /trip-invites/{inviteCode}/accept:
    post:
      tags: [Trips]
      summary: 초대 수락
      operationId: acceptTripInvite
      parameters:
        - name: inviteCode
          in: path
          required: true
          schema:
            type: string
            minLength: 4
            maxLength: 64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptTripInviteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripDetail'
        '409':
          $ref: '#/components/responses/Conflict'
  /places/search:
    get:
      tags: [Places]
      summary: 장소 검색
      operationId: searchPlaces
      description: 관광공사 데이터랩 API 기반. 캐시/TTL 확인 필요.
      parameters:
        - $ref: '#/components/parameters/q'
        - $ref: '#/components/parameters/bbox'
        - name: legalRegionCode
          in: query
          schema:
            type: string
            maxLength: 10
        - name: category
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPlaceSummary'
        '502':
          $ref: '#/components/responses/BadGateway'
  /places/{provider}/{externalPlaceId}:
    get:
      tags: [Places]
      summary: 장소 상세 조회
      operationId: getPlace
      parameters:
        - $ref: '#/components/parameters/provider'
        - $ref: '#/components/parameters/externalPlaceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /swipe/feed:
    get:
      tags: [Swipe]
      summary: 전역 스와이프 feed
      operationId: getSwipeFeed
      description: trip 종속이 아닌 전역 개인 선호도 수집 feed. MVP에서는 trip context를 받거나 저장하지 않는다.
      parameters:
        - name: legalRegionCode
          in: query
          schema:
            type: string
            maxLength: 10
        - name: category
