  /trips/{tripId}/place-recommendations:
    get:
      tags: [Places]
      summary: 여행방 추천 장소 목록
      operationId: listTripPlaceRecommendations
      description: >
        matchedMembers는 avatar/id/name 수준만 반환하고 raw/normalized score는 반환하지 않는다.
        bbox는 필수이며, 클라이언트는 검색 실행 또는 수동 새로고침 시점의 현재 지도 viewport를 전달한다.
        지도 pan/zoom만으로 자동 재호출하지 않는다.
      parameters:
        - $ref: '#/components/parameters/tripId'
        - name: bbox
          in: query
          required: true
          description: minLng,minLat,maxLng,maxLat. 추천 후보는 이 지도 viewport 안의 장소로 제한한다.
          schema:
            type: string
            pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
        - name: centerLat
          in: query
          schema:
            type: number
            format: double
        - name: centerLng
          in: query
          schema:
            type: number
            format: double
        - name: tab
          in: query
          schema:
            $ref: '#/components/schemas/RecommendationTab'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedPlaceRecommendation'
