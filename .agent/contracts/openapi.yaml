components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    tripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    dayId:
      name: dayId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    itemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    routeId:
      name: routeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    drawingId:
      name: drawingId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    checklistId:
      name: checklistId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    recordId:
      name: recordId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    mediaFileId:
      name: mediaFileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    postId:
      name: postId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    notificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    provider:
      name: provider
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/PlaceProvider'
    externalPlaceId:
      name: externalPlaceId
      in: path
      required: true
      schema:
        type: string
        maxLength: 120
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    offset:
      name: offset
      in: query
      description: Offset 기반 무한스크롤 시작 위치. Chat/AI message 목록에서 사용한다.
      schema:
        type: integer
        minimum: 0
        default: 0
    limit:
      name: limit
      in: query
      description: Offset 기반 무한스크롤 page size. Chat/AI message 목록에서 사용한다.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    sort:
      name: sort
      in: query
      description: field,asc 또는 field,desc. Endpoint별 whitelist 적용.
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
    q:
      name: q
      in: query
      schema:
        type: string
        minLength: 1
        maxLength: 120
    bbox:
      name: bbox
      in: query
      description: minLng,minLat,maxLng,maxLat
      schema:
        type: string
        pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'
    idempotencyKey:
      name: Idempotency-Key
      in: header
      description: 중복 생성/외부 호출 방지용 key.
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
    websocketSessionId:
      name: X-Soomgil-WebSocket-Session-Id
      in: header
      description: 협업 undo/redo stack 귀속용 활성 WebSocket 세션 ID.
      required: false
      schema:
        type: string
        maxLength: 120
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationError:
      description: Validation or business rule error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TooManyRequests:
      description: Rate limit exceeded. Retry-After header is included when a retry time is known.
      headers:
        Retry-After:
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    BadGateway:
      description: Upstream provider error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status, code]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
        requestId:
          type: string
        fields:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              reason:
                type: string
    PageMeta:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        sort:
